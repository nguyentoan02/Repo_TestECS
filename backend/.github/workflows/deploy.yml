name: Deploy to Amazon ECS

on:
   push:
      branches:
         - staging

env:
   # Pull sensitive infra configuration from GitHub Secrets
   AWS_REGION: ${{ secrets.AWS_REGION }}
   ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
   ECS_SERVICE: ${{ secrets.ECS_SERVICE }}
   ECS_CLUSTER: ${{ secrets.ECS_CLUSTER }}
   ECS_TASK_DEFINITION: task-definition.json
   CONTAINER_NAME: ${{ secrets.CONTAINER_NAME }}

jobs:
   deploy:
      name: Build and Deploy
      runs-on: ubuntu-latest

      # Steps:
      steps:
         - name: Checkout code
           # Purpose: fetch repository contents for build
           uses: actions/checkout@v4

         - name: Configure AWS credentials
           # Purpose: provide AWS access for later ECR/ECS actions
           uses: aws-actions/configure-aws-credentials@v4
           with:
              aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
              aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
              aws-region: ${{ env.AWS_REGION }}

         - name: Login to Amazon ECR
           # Purpose: authenticate Docker to push image to ECR
           id: login-ecr
           uses: aws-actions/amazon-ecr-login@v2

         - name: Inject secrets into task definition
           # Purpose: replace placeholders in task-definition.json with real ARNs from GitHub Secrets
           run: |
              # Replace placeholder ARNs in the task definition with real secret ARNs from GitHub Secrets
              sed -i 's|SECRET_ARN|${{ secrets.DATABASE_SECRET_ARN }}|g' ${{ env.ECS_TASK_DEFINITION }}
              sed -i 's|ROLE_ARN|${{ secrets.EXECUTION_ROLE_ARN }}|g' ${{ env.ECS_TASK_DEFINITION }}

         - name: Build, tag, and push image to Amazon ECR
           # Purpose: build Docker image from repository, tag with commit SHA, and push to ECR
           id: build-image
           env:
              ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
              IMAGE_TAG: ${{ github.sha }}
           run: |
              docker build -t $ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:$IMAGE_TAG .
              docker push $ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:$IMAGE_TAG
              echo "image=$ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:$IMAGE_TAG" >> $GITHUB_OUTPUT

         - name: Render ECS task definition with the new image
           # Purpose: substitute the built image name into the ECS task definition
           id: task-def
           uses: aws-actions/amazon-ecs-render-task-definition@v1
           with:
              task-definition: ${{ env.ECS_TASK_DEFINITION }}
              container-name: ${{ env.CONTAINER_NAME }}
              image: ${{ steps.build-image.outputs.image }}

         - name: Deploy new task definition to Amazon ECS
           # Purpose: register and update the ECS service with the new task definition and image
           uses: aws-actions/amazon-ecs-deploy-task-definition@v1
           with:
              task-definition: ${{ steps.task-def.outputs.task-definition }}
              service: ${{ env.ECS_SERVICE }}
              cluster: ${{ env.ECS_CLUSTER }}
              wait-for-service-stability: true

         - name: Send deployment notification email
           # Purpose: always send a notification email with deployment result (success/failure)
           if: always()
           uses: dawidd6/action-send-mail@v3
           with:
              server_address: smtp.gmail.com
              server_port: 465
              username: ${{ secrets.MAIL_USERNAME }}
              password: ${{ secrets.MAIL_PASSWORD }}
              subject: "${{ job.status == 'success' && ' SUCCESS' || ' FAILED' }}: Deploy flexiblejob.site"
              to: hestina789@gmail.com
              from: GitHub Actions
              body: |
                 Deployment result: ${{ job.status }}
                 - Repo: ${{ github.repository }}
                 - Commit: ${{ github.event.head_commit.message }}
                 - Details: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
